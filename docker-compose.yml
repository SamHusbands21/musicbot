services:
  lavalink:
    image: ghcr.io/lavalink-devs/lavalink:4
    container_name: musicbot-lavalink
    restart: unless-stopped
    env_file:
      - .env
    environment:
      - _JAVA_OPTIONS=${LAVALINK_JAVA_OPTS:-"-Xms256m -Xmx512m"}
      - SERVER_PORT=${LAVALINK_SERVER_PORT:-2333}
      - LAVALINK_SERVER_PASSWORD=${LAVALINK_SERVER_PASSWORD:-changeme}
    volumes:
      - ./ops/lavalink/application.yml:/opt/Lavalink/application.yml:ro
      - lavalink_plugins:/opt/Lavalink/plugins
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:${LAVALINK_SERVER_PORT:-2333}/version || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 5
    ports:
      - "2333:2333"

  bot:
    build:
      context: .
      dockerfile: bot/Dockerfile
    container_name: musicbot-app
    restart: unless-stopped
    env_file:
      - .env
    depends_on:
      lavalink:
        condition: service_healthy
    volumes:
      - bot_data:/data

volumes:
  bot_data:
  lavalink_plugins:
